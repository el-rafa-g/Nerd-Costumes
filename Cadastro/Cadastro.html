<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerd Costumes - Cadastro</title>
    <link rel="stylesheet" href="Cadastro.css">
</head>

<body>

    <div class="sign-in-container">

        <div class="formulario">

            <h1>Apenas mais um passo para acessar o Nerd Costumes!</h1>

            <label for="name">Nickname:</label><br>
            <input type="name" name="name" id="name" placeholder="Digite seu Nickname">

            <br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" name="email" id="email" placeholder="Digite seu E-mail">

            <br><br>

            <label for="password">Senha:</label><br>
            <input type="password" name="password" id="password" placeholder="Digite sua senha">

            <br><br>

            <label for="password">Confirme sua senha:</label><br>
            <input type="password" name="password" id="password" placeholder="Confirme sua senha">

            <br><br>

            <label for="date">Confirme sua Idade:</label><br>
            <input type="date" name="date" id="date" placeholder="Quantos anos você tem?">

            <br><br>

            <button>
                <a href="../Pagina Inicial/Pagina-Inicial.html">Cadastrar</a>
            </button>

            <h5>
                Já tem uma conta? 
                <a href="../Login/Login.html">Faça Login!</a>
            </h5>

        </div>
    </div>

</body>

</html>
