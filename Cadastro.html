<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerd Costumes - Cadastro</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .sign-in-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .formulario {
            text-align: center;
        }

        input {
            width: 80%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 2px solid #100f0f;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4b0082;
            color: white;
            cursor: pointer;
        }

        button a {
            color: white;
            text-decoration: none;
        }

        button:hover {
            background-color: #36005f;
        }
    </style>
</head>

<body>

    <div class="sign-in-container">

        <div class="formulario">

            <h1>Apenas mais um passo para acessar o Nerd Costumes!</h1>

            <label for="name">Nickname:</label><br>
            <input type="name" name="name" id="name" placeholder="Digite seu Nickname">

            <br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" name="email" id="email" placeholder="Digite seu E-mail">

            <br><br>

            <label for="password">Senha:</label><br>
            <input type="password" name="password" id="password" placeholder="Digite sua senha">

            <br><br>

            <label for="password">Confirme sua senha:</label><br>
            <input type="password" name="password" id="password" placeholder="Confirme sua senha">

            <br><br>

            <label for="date">Confirme sua Idade:</label><br>
            <input type="date" name="date" id="date" placeholder="Quantos anos você tem?">

            <br><br>

            <button>
                <a href="Pagina-Inicial.html">Cadastrar</a>
            </button>

            <h5>
                Já tem uma conta? 
                <a href="Login.html">Faça Login!</a>
            </h5>

        </div>
    </div>

</body>

</html>
