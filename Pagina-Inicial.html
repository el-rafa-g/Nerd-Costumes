<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerd Costumes - Página Inicial</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;

        }


        .top-bar {
            background: #4b0082;
            width: 99%;
            padding: 15px;

            justify-content: space-between;
            align-items: center;
            gap: 20px;
            display: flex;

            position: fixed;
            left: 0;
            top: 0;

            z-index: 1000;
        }

        .top-bar img {
            padding: 5px;
            width: 40px;

        }

        .menu-btn {
            width: 20px;
            cursor: pointer;
        }


        .menu-btn span {
            display: block;
            height: 2px;
            background: white;
            margin: 4px 0;
            border-radius: 3px;
        }

        .profile-btn {
            cursor: pointer;
        }

        #menu-toggle {
            display: none;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;

            width: 250px;
            height: 100vh;

            background: #36005f;

            padding-top: 80px;
            z-index: 999;
            transition: 0.3s;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 25px;
        }

        .sidebar a:hover {
            background: #4b0082;
        }

        #menu-toggle:checked~.sidebar {
            left: 0;
        }

        .menu-sidebar {
            position: fixed;
            top: 0;
            left: -2px;
            border: #000000 solid 2px;

            width: 248px;
            height: 100vh;

            background: #ffffff;

            padding-top: 80px;
            z-index: 998;
            transition: 0.3s;
        }

        .search-box {
            padding: 25px;
            position: relative;
        }

        .search-box input {
            width: 85%;
            padding: 10px;
            border-radius: 5px;
            border: 2px solid #100f0f;
        }

        .search-box .icon {
            position: absolute;
            right: 35px;
            top: 48%;
            transform: translateY(-50%);
            color: #888;
            font-size: 16px;
        }

        .filters {
            padding: 25px;
            position: relative;
        }

        .filter-btn {
            width: 95%;
            font-size: 22px;
            color: #000000;
            padding: 10px 20px;
            border: 2px solid #000000;
            border-radius: 5px;
            background-color: #ffffff;
            cursor: pointer;

            display: flex;
            justify-content: space-between;
            align-items: center;

            box-sizing: border-box;
        }

        .filter-text {
            flex: 1;
            text-align: center;
        }

        .filter-btn img {
            width: 20px;
            transition: 0.3s;
            padding: 5px 5px;
        }

        .filter-btn .icon {
            display: flex;
            align-items: center;
        }

        .filters-content {
            width: 95%;
            margin-top: 10px;

            border: 2px solid #000000;
            border-radius: 5px;

            background: white;

            max-height: 0;
            overflow: hidden;

            transition: 0.3s;

            box-sizing: border-box;
        }

        .filters-content a {
            display: block;
            padding: 12px;
            text-decoration: none;
            color: black;
            border-bottom: 1px solid #ddd;
        }

        .filters-content a:last-child {
            border-bottom: none;
        }

        .filters-content a:hover {
            background: #f0f0f0;
        }

        #filters-toggle {
            display: none;
        }

        #filters-toggle:checked~.filters-content {
            max-height: 300px;
        }

        #filters-toggle:checked+.filter-btn img {
            transform: rotate(180deg);
        }
    </style>
</head>

<body>
    <input type="checkbox" id="menu-toggle">

    <div class="top-bar">

        <label for="menu-toggle" class="menu-btn">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <div class="profile-btn">
            <a href="Perfil.html">
                <img src="perfil.png" alt="">
            </a>
        </div>

    </div>

    <div class="sidebar">
        <a href="Pagina-Inicial.html">Início</a>
        <a href="#">Blog</a>
        <a href="Login.html">Sair</a>
    </div>


    <div class="menu-sidebar">
        <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" placeholder="Pesquisar...">
        </div>

        <div class="filters">

            <input type="checkbox" id="filters-toggle">

            <label for="filters-toggle" class="filter-btn">

                <span class="filter-text">Filtros</span>

                <span class="icon">
                    <img src="Seta-baixo.png" alt="">
                </span>

            </label>

            <div class="filters-content">
                <a href="#">Categoria 1</a>
                <a href="#">Categoria 2</a>
                <a href="#">Categoria 3</a>
            </div>

        </div>
    </div>

</body>

</html>
